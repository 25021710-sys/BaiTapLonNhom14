name: Java CI/CD with Maven

# 1. Kích hoạt khi có người đẩy code (push) lên nhánh main hoặc master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 2. Mượn một máy chủ Linux ảo của GitHub
    runs-on: ubuntu-latest

    steps:
      # 3. Tải mã nguồn về máy chủ ảo
      - uses: actions/checkout@v4

      # 4. Cài đặt môi trường Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 5. Chạy lệnh Maven để đóng gói và tự động chạy các file unit test
      - name: Build and Test with Maven
        run: mvn -B package --file pom.xml